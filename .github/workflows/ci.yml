name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, issue-14-ci-matrix]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines (chromium leg) and commit them back to the branch'
        type: boolean
        default: false

# Default read-only; the chromium leg needs write only when committing
# regenerated Linux visual baselines back to the branch (dispatch path).
permissions:
  contents: write

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest

    strategy:
      # Three browsers as three PARALLEL jobs (no sharding). One engine failing
      # should not cancel the others — we want the full per-engine signal.
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    # ParaBank under test, run as a PER-JOB service container alongside each
    # matrix leg (every browser gets its own fresh container + seed).
    # Layer 1 health gate (Docker): the parasoft/parabank image is built on
    # tomcat:10.1-jre21-temurin-noble and ships WITHOUT curl or wget, so a
    # curl-based --health-cmd can never succeed and the container is reported
    # unhealthy forever. Instead probe with a bash builtin (/dev/tcp) that the
    # base image guarantees, confirming Tomcat has bound port 8080. Real
    # readiness (the WAR deployed and the login endpoint serving 200) is
    # enforced by the layer-2 workflow poll below.
    services:
      parabank:
        image: parasoft/parabank
        ports:
          - 8080:8080
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/8080' || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 90s

    env:
      PARABANK_URL: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable pnpm 9.15.9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (${{ matrix.browser }} + system deps)
        run: pnpm exec playwright install --with-deps ${{ matrix.browser }}

      # Layer 2 health gate (workflow). The Docker health-cmd above only proves
      # Tomcat bound the port; it does NOT prove the app is usable. Crucially,
      # the parasoft/parabank image boots with an EMPTY HSQLDB: the demo user
      # john/demo (customer #12212) does not exist until the DB is seeded, so
      # GET .../bank/login/john/demo returns "400 Invalid username and/or
      # password" and /index.htm 302-redirects to /initializeDB.htm. The public
      # demo instance is pre-seeded; the fresh container is not. So we:
      #   1) wait for the webapp to actually respond,
      #   2) POST .../services/bank/initializeDB once to seed the demo data,
      #   3) poll the login endpoint until it returns HTTP 200 (proves the seed
      #      took and the suite's API spine will work) before starting tests.
      - name: Wait for ParaBank and seed the demo database
        run: |
          base="http://localhost:8080/parabank"

          echo "Waiting for the ParaBank webapp to respond..."
          up=0
          for attempt in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${base}/index.htm" || echo "000")
            echo "Webapp probe attempt ${attempt}: HTTP ${code}"
            # Any real HTTP response (200/302/4xx) means Tomcat deployed the WAR.
            if [ "${code}" != "000" ] && [ "${code}" != "502" ] && [ "${code}" != "503" ]; then
              up=1
              break
            fi
            sleep 10
          done
          if [ "${up}" != "1" ]; then
            echo "ParaBank webapp never responded." >&2
            exit 1
          fi

          echo "Seeding the demo database (POST initializeDB)..."
          seed=$(curl -s -o /dev/null -w '%{http_code}' -X POST "${base}/services/bank/initializeDB" || echo "000")
          echo "initializeDB returned HTTP ${seed}"

          echo "Polling login endpoint until HTTP 200..."
          for attempt in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              "${base}/services/bank/login/john/demo" || echo "000")
            echo "Login probe attempt ${attempt}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "ParaBank is ready and seeded."
              exit 0
            fi
            # Re-seeding is idempotent; retry it in case the first POST raced boot.
            curl -s -o /dev/null -X POST "${base}/services/bank/initializeDB" || true
            sleep 10
          done
          echo "ParaBank login never returned 200 after seeding." >&2
          exit 1

      - name: Run Playwright tests (${{ matrix.browser }})
        run: pnpm exec playwright test --project=${{ matrix.browser }}

      # The `visual` project is Chromium-only (toHaveScreenshot baselines are
      # rendering-engine specific). Run it as part of the chromium matrix leg,
      # AFTER the functional run, so the visual regression gate executes and
      # passes in CI on Linux against the freshly-seeded Docker DB.
      #
      # When the workflow is dispatched with update_visual_baselines=true, the
      # chromium leg regenerates the Linux baselines (--update-snapshots) instead
      # of asserting against them; a later step commits the new -linux.png files
      # back to the branch. Normal runs assert without --update-snapshots.
      - name: Run visual regression (chromium-only, Linux baselines)
        if: matrix.browser == 'chromium' && github.event.inputs.update_visual_baselines != 'true'
        run: pnpm exec playwright test --project=visual

      - name: Regenerate Linux visual baselines (dispatch only)
        if: matrix.browser == 'chromium' && github.event.inputs.update_visual_baselines == 'true'
        run: pnpm exec playwright test --project=visual --update-snapshots

      - name: Commit regenerated Linux visual baselines
        if: matrix.browser == 'chromium' && github.event.inputs.update_visual_baselines == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/visual/visual.spec.ts-snapshots/
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            git commit -m "test(visual): add Linux visual baselines generated in CI"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7
