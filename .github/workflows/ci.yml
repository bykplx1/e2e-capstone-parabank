name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [issue-13-ci-tracer]
  workflow_dispatch:

jobs:
  e2e-chromium:
    name: E2E (chromium)
    runs-on: ubuntu-latest

    # ParaBank under test, run as a service container alongside the job.
    # Layer 1 health gate: Docker polls the REST login endpoint until the app
    # finishes booting (the WAR can take 1-2 min to deploy under Tomcat).
    services:
      parabank:
        image: parasoft/parabank
        ports:
          - 8080:8080
        options: >-
          --health-cmd "curl -fsS http://localhost:8080/parabank/services/bank/login/john/demo || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 90s

    env:
      PARABANK_URL: http://localhost:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm 9.15.9
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium + system deps)
        run: pnpm exec playwright install --with-deps chromium

      # Layer 2 health gate: even though the service container reports healthy,
      # re-confirm from the job context that the published port serves HTTP 200
      # on the login endpoint before launching the suite. Bounded retries fail
      # the job loudly rather than letting tests flake against a half-booted app.
      - name: Wait for ParaBank to be ready
        run: |
          echo "Polling ParaBank login endpoint until HTTP 200..."
          for attempt in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://localhost:8080/parabank/services/bank/login/john/demo || echo "000")
            echo "Attempt ${attempt}: HTTP ${code}"
            if [ "${code}" = "200" ]; then
              echo "ParaBank is ready."
              exit 0
            fi
            sleep 10
          done
          echo "ParaBank did not become ready in time." >&2
          exit 1

      - name: Run Playwright tests (chromium)
        run: pnpm exec playwright test --project=chromium

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
